    <text x="188" y="114" fill="#b53225" stroke="#130b08" stroke-width="1.25" paint-order="stroke fill" font-family="Georgia, 'Times New Roman', serif" font-size="23" font-weight="700" letter-spacing="6">
      SANGRE Y ACERO
    </text>
    <path d="M185 92h284" stroke="#a9823a" stroke-width="2" opacity="0.8"/>
    <path d="M185 122h284" stroke="#4d2b20" stroke-width="2" opacity="0.9"/>
